name: Build and push agent images

# Pushes to GitHub Container Registry, not a per-install registry (ADR 003's
# bundled registry:2 / Yggdrasil-operated registry are for per-project app
# images built from a project's own Dockerfile — they live inside each
# customer's own cluster/namespace, which centralized CI has no path to push
# into). agent-images is one shared, suite-maintained artifact: every
# Orchestrator (self-hosted or managed) pulls it directly from ghcr.io. See
# ../../docs/concepts/images.md.

on:
  push:
    branches: [main]
    paths:
      - "base/**"
      - "extensions/**"
      - "spec_grill/**"
      - "feature_build/**"
      - "test_run/**"
      - "models.json.template"
      - ".github/workflows/build-images.yml"
  pull_request:
    paths:
      - "base/**"
      - "extensions/**"
      - "spec_grill/**"
      - "feature_build/**"
      - "test_run/**"
      - "models.json.template"
      - ".github/workflows/build-images.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  # ghcr.io/yggdrasil-hq/yggdrasil-agent-images — each job kind is a path
  # segment under this one repository, not a separate GHCR package per kind.
  IMAGE_ROOT: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Skipped on pull_request: fork PRs get a read-only GITHUB_TOKEN, and
      # the build-only job below never pushes, so there's nothing to
      # authenticate for.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        run: echo "sha_tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # Build order matters (see ../../docs/concepts/images.md): base first
      # (Pi + the shared yggdrasil-contract extension + model config
      # templating), then the three per-job-kind images FROM it (ADR 004).
      # Plain `docker build`, not buildx — matches exactly what was verified
      # locally by hand before this workflow was written.
      - name: Build base image
        run: |
          docker build -f base/Dockerfile \
            -t "$IMAGE_ROOT/base:${{ steps.vars.outputs.sha_tag }}" \
            -t "$IMAGE_ROOT/base:latest" \
            .

      - name: Build spec_grill image
        run: |
          docker build -f spec_grill/Dockerfile \
            --build-arg BASE_IMAGE="$IMAGE_ROOT/base:${{ steps.vars.outputs.sha_tag }}" \
            -t "$IMAGE_ROOT/spec_grill:${{ steps.vars.outputs.sha_tag }}" \
            -t "$IMAGE_ROOT/spec_grill:latest" \
            .

      - name: Build feature_build image
        run: |
          docker build -f feature_build/Dockerfile \
            --build-arg BASE_IMAGE="$IMAGE_ROOT/base:${{ steps.vars.outputs.sha_tag }}" \
            -t "$IMAGE_ROOT/feature_build:${{ steps.vars.outputs.sha_tag }}" \
            -t "$IMAGE_ROOT/feature_build:latest" \
            .

      - name: Build test_run image
        run: |
          docker build -f test_run/Dockerfile \
            --build-arg BASE_IMAGE="$IMAGE_ROOT/base:${{ steps.vars.outputs.sha_tag }}" \
            -t "$IMAGE_ROOT/test_run:${{ steps.vars.outputs.sha_tag }}" \
            -t "$IMAGE_ROOT/test_run:latest" \
            .

      # PRs stop here (build validation only) — nothing below runs.
      - name: Push images
        if: github.event_name != 'pull_request'
        run: |
          for image in base spec_grill feature_build test_run; do
            docker push "$IMAGE_ROOT/$image:${{ steps.vars.outputs.sha_tag }}"
            docker push "$IMAGE_ROOT/$image:latest"
          done
